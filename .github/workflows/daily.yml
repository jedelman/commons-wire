name: Daily digest

on:
  schedule:
    # 7am UTC daily
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (score-only, dry-run, full)"
        required: false
        default: "score-only"
        type: choice
        options:
          - score-only
          - dry-run
          - full

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="score-only"; fi
          case "$MODE" in
            score-only) python scripts/run.py --score-only ;;
            dry-run)    python scripts/run.py --dry-run ;;
            full)       python scripts/run.py ;;
          esac

      - name: Commit results
        run: |
          git config user.email "claude@anthropic.com"
          git config user.name "Claude"
          git add scored/ posts/ index.html
          git diff --staged --quiet || git commit -m "scored: $(date +%Y-%m-%d)"
          git push
